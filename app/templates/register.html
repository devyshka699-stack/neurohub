{% extends "base.html" %}
{% block title %}Регистрация — {{ shop_name }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white rounded-2xl border border-slate-200 p-8">
        <h1 class="text-2xl font-bold text-center">Регистрация</h1>
        {% if error %}
        <div class="mt-4 px-4 py-3 rounded-lg bg-red-50 text-red-700 text-sm">{{ error }}</div>
        {% endif %}
        <form method="post" action="/register" class="mt-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Имя</label>
                <input type="text" name="name" required
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-violet-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-violet-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Пароль (минимум 6 символов)</label>
                <input type="password" name="password" required minlength="6"
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-violet-500">
            </div>
            <button type="submit" class="w-full py-3 rounded-xl bg-violet-600 text-white font-semibold hover:bg-violet-700 transition">
                Создать аккаунт
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-slate-500">
            Уже есть аккаунт? <a href="/login" class="text-violet-600 font-medium hover:underline">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
